<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>臻臻 - 配置 API Key</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
    .card { background: #1a1a1a; border-radius: 16px; padding: 32px; max-width: 400px; width: 100%; border: 1px solid #333; }
    h2 { font-size: 20px; margin-bottom: 16px; }
    input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #444; background: #111; color: #e0e0e0; font-size: 14px; margin-bottom: 12px; }
    .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin: 4px 0; }
    .btn-save { background: #5cb878; color: #000; }
    .btn-skip { background: #333; color: #999; }
    .msg { font-size: 13px; margin-top: 8px; min-height: 20px; }
    .ok { color: #5cb878; }
    .err { color: #e05555; }
    p { font-size: 13px; color: #999; line-height: 1.6; }
    a { color: #5cb878; }
  </style>
</head>
<body>
<div class="card">
  <h2>🔑 配置 DeepSeek API Key</h2>
  <p style="margin-bottom:12px;">前往 <a href="https://platform.deepseek.com/" target="_blank" rel="noopener noreferrer">platform.deepseek.com</a> 注册并获取 Key。</p>
  <input type="password" id="keyInput" placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off" />
  <div id="toggleShow" style="font-size:12px;color:#999;margin-bottom:8px;cursor:pointer;user-select:none;">👁 显示 Key</div>
  <button class="btn btn-save" onclick="save()">💾 保存并进入臻臻</button>
  <button class="btn btn-skip" onclick="skip()">跳过 → 本地模式</button>
  <div class="msg" id="msg"></div>
</div>
<script>
var showing = false;
document.getElementById('toggleShow').onclick = function() {
  showing = !showing;
  document.getElementById('keyInput').type = showing ? 'text' : 'password';
  this.textContent = showing ? '🙈 隐藏 Key' : '👁 显示 Key';
};

function save() {
  var key = document.getElementById('keyInput').value.trim();
  if (!key) { setMsg('请输入 API Key', 'err'); return; }
  if (!key.startsWith('sk-')) { setMsg('Key 格式应为 sk- 开头，请检查', 'err'); return; }
  try {
    localStorage.setItem('zhenzhen-api-key', key);
    localStorage.removeItem('zhenzhen-last-error');
    localStorage.removeItem('zhenzhen-last-error-time');
    setMsg('✅ Key 已保存！跳转中...', 'ok');
    setTimeout(function() { location.href = '/zhenzhen/'; }, 800);
  } catch(e) {
    setMsg('保存失败: ' + e.message, 'err');
  }
}

function skip() {
  localStorage.removeItem('zhenzhen-last-error');
  localStorage.removeItem('zhenzhen-last-error-time');
  location.href = '/zhenzhen/';
}

function setMsg(text, cls) {
  var m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + (cls || '');
}

// 自动填入已有的 Key
var existing = localStorage.getItem('zhenzhen-api-key');
if (existing) {
  document.getElementById('keyInput').value = existing;
  setMsg('检测到已保存的 Key (' + existing.slice(0,8) + '...)，可直接保存或更新', 'ok');
}
</script>
</body>
</html>
